<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPX AI - Gemini 3.1 Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; background: #0b0d12; color: #e8eaef; }
  body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  input, textarea, select, button { font-family: 'Inter', sans-serif; color: inherit; }
  select option { background: #1a1e28; }
  button:focus { outline: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/dashboard-js/components.jsx"></script>
<script type="text/babel" src="/dashboard-js/DashboardPage.jsx"></script>
<script type="text/babel" src="/dashboard-js/CalendarPage.jsx"></script>
<script type="text/babel" src="/dashboard-js/AgentSettingsPage.jsx"></script>
<script type="text/babel" src="/dashboard-js/CallLogsPage.jsx"></script>
<script type="text/babel" src="/dashboard-js/AutomationsPage.jsx"></script>
<script type="text/babel" src="/dashboard-js/MiscPages.jsx"></script>
<script type="text/babel" src="/dashboard-js/App.jsx"></script>

<script type="text/babel">
const NEEDED = ['C','DashboardPage','CalendarPage','AgentSettingsPage',
  'CallLogsPage','AutomationsPage',
  'OutboundPage','LanguagePage','DemoPage','App'];

function boot(attempts) {
  if (NEEDED.every(k => window[k])) {
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.App));
  } else if (attempts < 120) {
    setTimeout(() => boot(attempts + 1), 50);
  } else {
    const missing = NEEDED.filter(k => !window[k]);
    document.getElementById('root').innerHTML = '<div style="color:#f87171;padding:40px;font-family:monospace">Components failed to load: ' + missing.join(', ') + '<br>Check browser console for errors.</div>';
  }
}
boot(0);
</script>
</body>
</html>
